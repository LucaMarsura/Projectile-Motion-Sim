<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel= "stylesheet" href = "style.css">
    <title>Physics Sim</title>
</head>
<body>
  <nav>
      <ul>
        <li><a href="index.html" id="homescreen-hyperlink"><img src="images/logo.png" id="logo-img"></a></li>
        <li><a href="learn.html" class="hyperlinks">Learn</a></li>
        <li><a href="gameindex.html" class="hyperlinks">Game</a></li>
        <li><a href="sim.html" id="simulation-hyperlink" class="hyperlinks">Simulation</a></li>
        <li><a href="features.html" class="hyperlinks">Features</a></li>
        <li><a href="guide.html" class="hyperlinks">Guide</a></li>
    </ul>
  </nav>
  <div id = "total">
    <h1 id = "title">Projectile Motion and Drag Simulation</h1>
    <div>
      <div>
      <h2 id = "subtitle">Input Parameters</h2>

      <form id = "parameters">

        <div id = "indepparameter">
          <h3>Independent Variables</h3>
          <div>
            <input id = "bool_ivelocity" value = "bool_ivelocity" type = "checkbox" name = "indepbool">
            <input id = "ivelocity" type = "range" min = "0" max = "40" value = "10" step = "0.1" disabled>
            <span id = "ivelocity_label" class = "indep_labels">0</span>
            <label for = "ivelocity">Initial Velocity</label>
          </div>
          <div>
            <input id = "bool_iheight" value = "bool_iheight" type = "checkbox" name = "indepbool">
            <input id = "iheight" type = "range" min = "0" max = "20" value = "0" step = "0.1" disabled>
            <span id = "iheight_label" class = "indep_labels">0</span>
            <label for = "iheight">Initial Height</label>
          </div>
          <div>
            <input id = "bool_iangle" value = "bool_iangle" type = "checkbox" name = "indepbool">
            <input id = "iangle" type = "range" min = "-90" max = "90" value = "45" step = "1" disabled>
            <span id = "iangle_label" class = "indep_labels">0</span>
            <label for = "iangle">Launch Angle</label>
          </div>
          <div>
            <input id = "bool_gravity" value = "bool_gravity" type = "checkbox" name = "indepbool">
            <input id = "gravity" type = "range" min = "0" max = "100" value = "9.81" step = "0.01" disabled>
            <span id = "gravity_label" class = "indep_labels">0</span>
            <label for = "gravity">Ambient Gravity</label>
          </div>
        </div>
        <div id = "depparameter">
          <h3>Dependent Variable</h3>
          <div>
            <input id = "bool_distance" value = "bool_distance" type = "radio" name = "depbool">
            <input id = "distance" type = "range" min = "0" max = "50" value = "4" step = "0.1" disabled>
            <span id = "distance_label" class = "dep_labels">0</span>
            <label for = "distance">Distance Traveled</label>
          </div>
          <div>
            <input id = "bool_maxheight" value = "bool_maxheight" type = "radio" name = "depbool">
            <input id = "maxheight" type = "range" min = "0" max = "50" value = "4" step = "0.1" disabled>
            <span id = "maxheight_label" class = "dep_labels">0</span>
            <label for = "maxheight">Peak Height Reached</label>
          </div>
          <div>
            <input id = "bool_time" value = "bool_time" type = "radio" name = "depbool">
            <input id = "time" type = "range" min = "0" max = "10" value = "2" step = "0.1" disabled>
            <span id = "time_label" class = "dep_labels">0</span>
            <label for = "time">Time</label>
          </div>
          <div>
            <input id = "bool_fvelocity" value = "bool_fvelocity" type = "radio" name = "depbool">
            <input id = "fvelocity" type = "range" min = "0" max = "20" value = "10" step = "0.1" disabled>
            <span id = "fvelocity_label" class = "dep_labels">0</span>
            <label for = "fvelocity">Final Velocity</label>
          </div>
        </div>
        <div id = "dragparameter">
          <h3>Drag Parameters</h3>
          <div>
            <input id = "bool_aeropreset" value = "bool_aeropreset" type = "radio" name = "aerobool">
            <label for = "aeropreset">Drag Parameter Presets</label>
            <select id = "aeropreset" disabled>
              
              <option value = "" disabled selected>Select a preset</option>
              <option value = "aeropreset_baseball">Baseball</option>
              <option value = "aeropreset_football">Football</option>
              <option value = "aeropreset_ppball">Ping Pong Ball</option>
              <option value = "aeropreset_tennisball">Tennis Ball</option>
              <option value = "aeropreset_soccerball">Soccer Ball</option>
              <option value = "aeropreset_paperplane">Paper Plane</option>
              <option value = "aeropreset_paperball">Paper Ball</option>

            </select>
          </div>
          <div>
            <input id = "bool_aerocustom" value = "bool_aerocustom" type = "radio" name = "aerobool">
            <label for = "bool_aerocustom">Custom Drag Parameters</label>
          </div>
          <div>
            <input id = "mass" type = "range" min = "1" max = "100" value = "6" step = "0.1" disabled>
            <span id = "mass_label" class = "aero_labels">>0</span>
            <label for = "mass">Projectile Mass</label>
          </div>
          <div>
            <input id = "cd" type = "range" min = "0.01" max = "1" value = "0.45" step = "0.01" disabled>
            <span id = "cd_label" class = "aero_labels">0</span>
            <label for = "cd">Drag Coefficient</label>
          </div>
          <div>
            <input id = "area" type = "range" min = "0.01" max = "10" value = "2" step = "0.01" disabled>
            <span id = "area_label" class = "aero_labels">0</span>
            <label for = "area">Cross-Sectional Area</label>
          </div>
        </div>
        <div id = "densityparameter">
          <h3>Density Parameters</h3>
          <div>
            <input id = "bool_denpreset" value = "bool_denpreset" type = "radio" name = "denbool">
            <label for = "denpreset">Drag Parameter Presets</label>
            <select id = "denpreset" disabled>
             
              <option value = "" disabled selected>Select a preset</option>
              <option value = "denpreset_air">Air</option>
              <option value = "denpreset_vacuum">Vacuum</option>
              <option value = "denpreset_water">Water</option>
              <option value = "denpreset_oil">Oil</option>
            </select>
          </div>
          <div>
            <input id = "bool_dencustom" value = "bool_aerocustom" type = "radio" name = "denbool">
            <label for = "bool_dencustom">Custom Density Parameters</label>
          </div>
          <div>
            <input id = "density" type = "range" min = "0.1" max = "1000" step = "0.1" value = "1.2" disabled>
            <span id = "density_label">0</span>
            <label for = "density">Fluid Density</label>
          </div>
        </div>
        <div id = "buttonparent">
          <button type = "submit" name = "run" id = "run">Run</button>
        </div>
      </form>
    </div>
    <script>
      function updateInputs() {
          document.getElementById("ivelocity").disabled = !document.getElementById("bool_ivelocity").checked;
          document.getElementById("iheight").disabled = !document.getElementById("bool_iheight").checked;
          document.getElementById("iangle").disabled = !document.getElementById("bool_iangle").checked;
          document.getElementById("gravity").disabled = !document.getElementById("bool_gravity").checked;

          document.getElementById("distance").disabled = !document.getElementById("bool_distance").checked;
          document.getElementById("maxheight").disabled = !document.getElementById("bool_maxheight").checked;
          document.getElementById("time").disabled = !document.getElementById("bool_time").checked;
          document.getElementById("fvelocity").disabled = !document.getElementById("bool_fvelocity").checked;
        
          const presetAero = document.getElementById("bool_aeropreset").checked;
          document.getElementById("aeropreset").disabled = !presetAero;
        
          const presetDen = document.getElementById("bool_denpreset").checked;
          document.getElementById("denpreset").disabled = !presetDen;

          const customAero = document.getElementById("bool_aerocustom").checked;
            document.getElementById("mass").disabled = !customAero;
            document.getElementById("cd").disabled = !customAero;
            document.getElementById("area").disabled = !customAero;

          document.getElementById("density").disabled = !document.getElementById("bool_dencustom").checked;
          }

      document.querySelectorAll("input[type='checkbox'], input[type='radio']").forEach(input => {
        	input.addEventListener("change", updateInputs);
	    });
      
      document.querySelectorAll("input[type='range']").forEach(slider => {
        slider.addEventListener("input", function() {
          document.getElementById(this.id + "_label").textContent = this.value;
        });
      });
      
      const units = {
        ivelocity: "m/s",
        iheight: "m",
        iangle: "°",
        gravity: "m/s²",
        distance: "m",
        maxheight: "m",
        time: "s",
        fvelocity: "m/s",
        mass: "kg",
        cd: "",
        area: "m²",
        density: "kg/m³"
      };

      const decimals = {
        ivelocity: 1,
        iheight: 1,
        iangle: 0,
        gravity: 2,
        distance: 1,
        maxheight: 1,
        time: 1,
        fvelocity: 1,
        mass: 3,
        cd: 2,
        area: 3,
        density: 1
      };

      document.querySelectorAll("input[type='range']").forEach(slider => {
        document.getElementById(slider.id + "_label").textContent = slider.value + " " + units[slider.id];

        slider.addEventListener("input", function() {
        document.getElementById(this.id + "_label").textContent = this.value + " " + units[this.id];
        });
      });      
    
      const aeroPresets = {
        aeropreset_baseball: { mass: 0.145, cd: 0.35, area: 0.004 },
        aeropreset_football: { mass: 0.430, cd: 0.47, area: 0.038 },
        aeropreset_ppball: { mass: 0.003, cd: 0.40, area: 0.001 },
        aeropreset_tennisball: { mass: 0.058, cd: 0.60, area: 0.003 },
        aeropreset_soccerball: { mass: 0.450, cd: 0.25, area: 0.038 },
        aeropreset_paperplane: { mass: 0.005, cd: 0.80, area: 0.015 },
        aeropreset_paperball: { mass: 0.004, cd: 0.47, area: 0.002 }
      };

      const denPresets = {
        denpreset_air: { density: 1.2 },
        denpreset_water: { density: 1000 },
        denpreset_oil: { density: 870 },
        denpreset_vacuum: { density: 0.0001 },
      };

      document.getElementById("aeropreset").addEventListener("change", function() {
        const preset = aeroPresets[this.value];
        if (preset) {
          document.getElementById("mass").value = preset.mass;
          document.getElementById("cd").value = preset.cd;
          document.getElementById("area").value = preset.area;

          ["mass", "cd", "area"].forEach(id => {
            const label = document.getElementById(id + "_label");
            if (label) {
              label.textContent = parseFloat(document.getElementById(id).value).toFixed(decimals[id]) + " " + units[id];
            }
          });
        }
      });

      document.getElementById("denpreset").addEventListener("change", function() {
        const preset = denPresets[this.value];
        if (preset) {
          document.getElementById("density").value = preset.density;

          const label = document.getElementById("density_label");
          if (label) {
            label.textContent = parseFloat(preset.density).toFixed(decimals["density"]) + " " + units["density"];
          }
        }
      });
      
      document.getElementById("aeropreset").addEventListener("change", function() {
        const preset = aeroPresets[this.value];
        if (preset) {
          document.getElementById("mass").value = preset.mass;
          document.getElementById("cd").value = preset.cd;
          document.getElementById("area").value = preset.area;

          document.getElementById("mass_label").textContent = parseFloat(preset.mass).toFixed(decimals["mass"]) + " " + units["mass"];
          document.getElementById("cd_label").textContent = parseFloat(preset.cd).toFixed(decimals["cd"]) + " " + units["cd"];
          document.getElementById("area_label").textContent = parseFloat(preset.area).toFixed(decimals["area"]) + " " + units["area"];
        }
      });

      document.getElementById("denpreset").addEventListener("change", function() {
        const preset = denPresets[this.value];
        if (preset) {
          document.getElementById("density").value = preset.density;
          document.getElementById("density_label").textContent = parseFloat(preset.density).toFixed(decimals["density"]) + " " + units["density"];
        }
      });

      document.getElementById("parameters").addEventListener("submit", function(e) {
        e.preventDefault();

        const depSelected = document.querySelector("input[name='depbool']:checked");
        const aeroSelected = document.querySelector("input[name='aerobool']:checked");
        const denSelected = document.querySelector("input[name='denbool']:checked");
        const indepChecked = document.querySelectorAll("input[name='indepbool']:checked").length;

        if (indepChecked < 3) { alert("Please select at least 3 of 4 independent variables."); return; }
        if (indepChecked === 3 && !depSelected) { alert("Please select a dependent variable when using 3 independent variables."); return; }
        if (!aeroSelected) { alert("Please select a drag parameter option."); return; }
        if (!denSelected) { alert("Please select a density parameter option."); return; }

        const sliders = ["ivelocity", "iheight", "iangle", "gravity", "distance", "maxheight", "time", "fvelocity"];
        const always = ["mass", "cd", "area", "density"];
        const data = {};

        sliders.forEach(id => {
          const el = document.getElementById(id);
          data[id] = el.disabled ? "" : el.value;
        });

        always.forEach(id => {
          data[id] = document.getElementById(id).value;
        });

        data["dep"] = depSelected?.value ?? "";
        data["aeropreset"] = document.getElementById("aeropreset").value;
        data["denpreset"] = document.getElementById("denpreset").value;

        fetch("/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        }).then(res => res.json()).then(result => {
          localStorage.setItem("simResult", JSON.stringify(result));
          window.location.href = "results.html";
        }).catch(err => {
          alert("Error: " + err);
        });
      });
    </script>
</body>
</html>
