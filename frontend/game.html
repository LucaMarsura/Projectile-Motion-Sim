<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "style.css">
    <link rel = "stylesheet" href = "stylegame.css">
    <title>Game — PMAD Simulator</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href = "index.html"><img src = "images/logo.png" id = "logo-img"></a></li>
            <li><a href = "learn.html" class = "hyperlinks">Learn</a></li>
            <li><a href = "gameindex.html" class = "hyperlinks">Game</a></li>
            <li><a href = "sim.html" class = "hyperlinks">Simulation</a></li>
            <li><a href = "features.html" class = "hyperlinks">Features</a></li>
            <li><a href = "guide.html" class = "hyperlinks">Guide</a></li>
        </ul>
    </nav>
    <div id = "total">
        <h1 id = "title">Trajectory Challenge</h1>
        <div id = "game-body">
            <div id = "game-left">
                <h2 id = "subtitle">Parameters</h2>
                <div id = "indepparameter">
                    <h3>Independent Variables</h3>
                    <div>
                        <input id = "ivelocity" type = "range" min = "0" max = "40" value = "20" step = "0.1" disabled>
                        <span id = "ivelocity_label" class = "indep_labels">—</span>
                        <label for = "ivelocity">Initial Velocity</label>
                    </div>
                    <div>
                        <input id = "iheight" type = "range" min = "0" max = "20" value = "10" step = "0.1" disabled>
                        <span id = "iheight_label" class = "indep_labels">—</span>
                        <label for = "iheight">Initial Height</label>
                    </div>
                    <div>
                        <input id = "iangle" type = "range" min = "-90" max = "90" value = "45" step = "1" disabled>
                        <span id = "iangle_label" class = "indep_labels">—</span>
                        <label for = "iangle">Launch Angle</label>
                    </div>
                    <div>
                        <input id = "gravity" type = "range" min = "0" max = "20" value = "9.81" step = "0.01" disabled>
                        <span id = "gravity_label" class = "indep_labels">—</span>
                        <label for = "gravity">Ambient Gravity</label>
                    </div>
                </div>
                <div id = "dragparameter">
                    <h3>Drag Parameters</h3>
                    <div>
                        <span id = "locked-aeropreset" class = "indep_labels">—</span>
                        <label>Drag Preset</label>
                    </div>
                    <div>
                        <span id = "locked-mass" class = "indep_labels">—</span>
                        <label>Mass</label>
                    </div>
                    <div>
                        <span id = "locked-cd" class = "indep_labels">—</span>
                        <label>Drag Coefficient</label>
                    </div>
                    <div>
                        <span id = "locked-area" class = "indep_labels">—</span>
                        <label>Cross-Sectional Area</label>
                    </div>
                </div>
                <div id = "densityparameter">
                    <h3>Density Parameters</h3>
                    <div>
                        <span id = "locked-denpreset" class = "indep_labels">—</span>
                        <label>Density Preset</label>
                    </div>
                    <div>
                        <span id = "locked-density" class = "indep_labels">—</span>
                        <label>Fluid Density</label>
                    </div>
                </div>
                <div id = "buttonparent">
                    <button id = "run" onclick = "runAttempt()">Launch</button>
                </div>
                <div id = "result-block" style = "display:none;">
                    <p id = "result-text"></p>
                    <button id = "new-btn" onclick = "newGame()">New Challenge</button>
                </div>
            </div>
            <div id = "game-right">
                <div id = "target-label">
                    <span id = "target-text">Loading...</span>
                </div>
                <div id = "graph-placeholder">
                    <p id = "graph-loading">Generating challenge...</p>
                </div>
                <img id = "graph-img" style = "display:none;" alt = "Game graph">
            </div>
        </div>
    </div>
    <script>
        let gameState = null;
        const sliderConfig = {
            ivelocity: { min: 0,   max: 40,  step: 0.01, unit: "m/s",  label: "Initial Velocity" },
            iheight:   { min: 0,   max: 20,  step: 0.01, unit: "m",    label: "Initial Height" },
            iangle:    { min: -90, max: 90,  step: 0.01, unit: "°",    label: "Launch Angle" },
            gravity:   { min: 0,   max: 20,  step: 0.01, unit: "m/s²", label: "Ambient Gravity" }
        };
        const aeroLabels = {
            aeropreset_baseball:   "Baseball",
            aeropreset_football:   "Football",
            aeropreset_ppball:     "Ping Pong Ball",
            aeropreset_tennisball: "Tennis Ball",
            aeropreset_soccerball: "Soccer Ball",
            aeropreset_paperplane: "Paper Plane",
            aeropreset_paperball:  "Paper Ball"
        };
        const denLabels = {
            denpreset_air:    "Air",
            denpreset_vacuum: "Vacuum",
            denpreset_water:  "Water",
            denpreset_oil:    "Oil"
        };
        async function loadGame(previousAttempt = null, previousState = null) {
            document.getElementById("result-block").style.display = "none";
            document.getElementById("graph-placeholder").style.display = "flex";
            document.getElementById("graph-img").style.display = "none";
            document.getElementById("graph-loading").textContent = "Generating challenge...";
            document.getElementById("target-text").textContent = "Loading...";
            document.getElementById("run").disabled = true;
            const res = await fetch("/game_setup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ previous_attempt: previousAttempt, previous_state: previousState })
            });
            gameState = await res.json();
            showGraph(gameState.graph);
            const allVars = ["ivelocity", "iheight", "iangle", "gravity"];
            const units = { ivelocity: "m/s", iheight: "m", iangle: "°", gravity: "m/s²" };
            allVars.forEach(v => {
                const slider = document.getElementById(v);
                const label  = document.getElementById(v + "_label");
                if (v === gameState.hidden_var) {
                    const cfg = sliderConfig[v];
                    slider.min      = cfg.min;
                    slider.max      = cfg.max;
                    slider.step     = cfg.step;
                    slider.disabled = false;
                    slider.value    = previousAttempt !== null ? previousAttempt : ((parseFloat(cfg.min) + parseFloat(cfg.max)) / 2).toFixed(1);
                    label.textContent = parseFloat(slider.value).toFixed(2) + " " + cfg.unit;
                    slider.oninput = function() {
                        label.textContent = parseFloat(this.value).toFixed(2) + " " + cfg.unit;
                    };
                } else {
                    slider.disabled   = true;
                    slider.value      = gameState.known_vars[v];
                    label.textContent = parseFloat(gameState.known_vars[v]).toFixed(2) + " " + units[v];
                }
            });
            document.getElementById("locked-aeropreset").textContent = aeroLabels[gameState.aeropreset] || gameState.aeropreset;
            document.getElementById("locked-mass").textContent       = gameState.mass.toFixed(4) + " kg";
            document.getElementById("locked-cd").textContent         = gameState.cd.toFixed(3);
            document.getElementById("locked-area").textContent       = gameState.area.toFixed(5) + " m²";
            document.getElementById("locked-denpreset").textContent  = denLabels[gameState.denpreset] || gameState.denpreset;
            document.getElementById("locked-density").textContent    = gameState.density.toFixed(4) + " kg/m³";
            document.getElementById("target-text").textContent =
                (gameState.gametype === "distance" ? "Distance" : "Peak Height") +
                ": " + gameState.target_min + " – " + gameState.target_max + " m";
            document.getElementById("run").disabled = false;
        }
        async function runAttempt() {
            document.getElementById("run").disabled = true;
            document.getElementById("graph-placeholder").style.display = "flex";
            document.getElementById("graph-loading").textContent = "Running simulation...";
            document.getElementById("graph-img").style.display = "none";
            const slider  = document.getElementById(gameState.hidden_var);
            const attempt = parseFloat(slider.value);
            const res = await fetch("/game_run", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    hidden_var:    gameState.hidden_var,
                    attempt_value: attempt,
                    known_vars:    gameState.known_vars,
                    target:        gameState.target,
                    gametype:      gameState.gametype,
                    aeropreset:    gameState.aeropreset,
                    denpreset:     gameState.denpreset
                })
            });
            const data = await res.json();
            showGraph(data.graph);
            gameState.lastAttempt = attempt;
            const resultBlock = document.getElementById("result-block");
            const resultText  = document.getElementById("result-text");
            resultBlock.style.display = "block";
            if (data.success) {
                resultText.textContent = "Trial Passed! Deviation: " + data.deviation.toFixed(2) + "%";
                resultText.style.color = "#16a34a";
            } else {
                resultText.textContent = "✗ Deviation: " + data.deviation.toFixed(2) + "% — adjust and try again.";
                resultText.style.color = "#dc2626";
                document.getElementById("run").disabled = false;
            }
        }
        function newGame() {
            const lastAttempt = gameState ? gameState.lastAttempt ?? null : null;
            const prevState   = gameState ? {
                known_vars: gameState.known_vars,
                hidden_var: gameState.hidden_var,
                aeropreset: gameState.aeropreset,
                denpreset:  gameState.denpreset,
                gametype:   gameState.gametype
            } : null;
            loadGame(lastAttempt, prevState);
        }
        function showGraph(b64) {
            document.getElementById("graph-placeholder").style.display = "none";
            const img = document.getElementById("graph-img");
            img.src = "data:image/png;base64," + b64;
            img.style.display = "block";
        }
        loadGame();
    </script>
</body>
</html>
