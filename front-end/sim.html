<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel= "stylesheet" href = "style.css">
    <title>Physics Sim</title>
</head>
<body>
  <nav>
      <ul>
          <li><a href = "index.html" id = "homescreen-hyperlink"><img src = "images/logo2.png" id = "logo-img"></a></li>
          <li><a href = "donate.html" id = "donate-hyperlink" class = "hyperlinks">Donate</a></li>
          <li><a href = "aboutme.html" id = "aboutme-hyperlink" class = "hyperlinks">About Me</a></li>
          <li><a href = "sim.html" id = "simulation-hyperlink" class = "hyperlinks">Simulation</a></li>
      </ul>
  </nav>
  <div id = "total">
    <h1 id = "title">Projectile Motion and Drag Simulation</h1>
    <div>
      <div>
      <h2 id = "subtitle">Input Parameters</h2>

      <form id = "parameters">

        <div id = "indepparameter">
          <h3>Independent Variables</h3>
          <div>
            <input id = "bool_ivelocity" value = "bool_ivelocity" type = "checkbox" name = "indepbool">
            <input id = "ivelocity" type = "range" min = "0" max = "100" disabled>
            <label for = "ivelocity">Initial Velocity</label>
          </div>
          <div>
            <input id = "bool_iheight" value = "bool_iheight" type = "checkbox" name = "indepbool">
            <input id = "iheight" type = "range" min = "0" max = "1000" disabled>
            <label for = "iheight">Initial Height</label>
          </div>
          <div>
            <input id = "bool_iangle" value = "bool_iangle" type = "checkbox" name = "indepbool">
            <input id = "iangle" type = "range" min = "-90" max = "90" disabled>
            <label for = "iangle">Launch Angle</label>
          </div>
          <div>
            <input id = "bool_gravity" value = "bool_gravity" type = "checkbox" name = "indepbool">
            <input id = "gravity" type = "range" min = "0" max = "100" disabled>
            <label for = "gravity">Ambient Gravity</label>
          </div>
        </div>


        <div id = "depparameter">
          <h3>Dependent Variable</h3>
          <div>
            <input id = "bool_distance" value = "bool_distance" type = "radio" name = "depbool">
            <input id = "distance" type = "range" min = "0" max = "5000" disabled>
            <label for = "distance">Distance Traveled</label>
          </div>
          <div>
            <input id = "bool_maxheight" value = "bool_maxheight" type = "radio" name = "depbool">
            <input id = "maxheight" type = "range" min = "0" max = "5000" disabled>
            <label for = "maxheight">Peak Height Reached</label>
          </div>
          <div>
            <input id = "bool_time" value = "bool_time" type = "radio" name = "depbool">
            <input id = "time" type = "range" min = "0" max = "30" disabled>
            <label for = "time">Ambient Gravity</label>
          </div>
          <div>
            <input id = "bool_fvelocity" value = "bool_fvelocity" type = "radio" name = "depbool">
            <input id = "fvelocity" type = "range" min = "0" max = "100" disabled>
            <label for = "fvelocity">Final Velocity</label>
          </div>
        </div>

        <div id = "dragparameter">
          <h3>Drag Parameters</h3>
          <div>
            <input id = "bool_aeropreset" value = "bool_aeropreset" type = "radio" name = "aerobool">
            <select id = "aeropreset">
            <label for = "aeropreset">Drag Parameter Presets</label>

              <option value = "aeropreset_baseball">Baseball</option>
              <option value = "aeropreset_football">Football</option>
              <option value = "aeropreset_ppball">Ping Pong Ball</option>
              <option value = "aeropreset_tennisball">Tennis Ball</option>
              <option value = "aeropreset_soccerball">Soccer Ball</option>
              <option value = "aeropreset_paper plane">Paper Plane</option>
              <option value = "aeropreset_paperball">Paper Ball</option>

            </select>
          </div>

          <div>
            <input id = "bool_aerocustom" value = "bool_aerocustom" type = "radio" name = "aerobool">
            <label for = "bool_aerocustom">Custom Drag Parameters</label>
          </div>
          <div>
            <input id = "mass" type = "range" min = "0.001" max = "100" disabled>
            <label for = "mass">Projectile Mass</label>
          </div>
          <div>
            <input id = "cd" type = "range" min = "0.001" max = "0.999" disabled>
            <label for = "cd">Drag Coefficient</label>
          </div>
          <div>
            <input id = "area" type = "range" min = "0.001" max = "100" disabled>
            <label for = "area">Cross-Sectional Area</label>
          </div>
        </div>

        <div id = "densityparameter">
          <h3>Density Parameters</h3>
          <div>
            <input id = "bool_denpreset" value = "bool_denpreset" type = "radio" name = "denbool">
            <select id = "denpreset">
            <label for = "denpreset">Drag Parameter Presets</label>

              <option value = "denpreset_air">Air</option>
              <option value = "denpreset_water">Water</option>
              <option value = "denpreset_oil">Oil</option>

            </select>
          </div>
          <div>
            <input id = "bool_dencustom" value = "bool_aerocustom" type = "radio" name = "denbool">
            <label for = "bool_dencustom">Custom Density Parameters</label>
          </div>
          <div>
            <input id = "density" type = "range" min = "0.001" max = "10000" disabled>
            <label for = "density">Fluid Density</label>
          </div>
        </div>
        <div id = "buttonparent">
          <button type = "submit" name = "run" id = "run">Run</button>
        </div>
      </form>
    </div>

</body>
</html>
